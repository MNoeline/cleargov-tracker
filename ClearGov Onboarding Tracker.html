<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClearGov Onboarding Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link href="./ClearGov Onboarding Tracker_files/css2" rel="stylesheet">
<link rel="stylesheet" href="./ClearGov Onboarding Tracker_files/tabler-icons.min.css">
<script src="./ClearGov Onboarding Tracker_files/xlsx.full.min.js.download"></script>
<style>
  :root{
    --bg:#F5F4F0;--surface:#FFFFFF;--surface2:#EEECEA;
    --border:rgba(0,0,0,0.10);--border-mid:rgba(0,0,0,0.18);
    --text:#1A1916;--text-muted:#6B6960;--text-hint:#9E9D97;
    --blue:#1A56A4;--blue-bg:#E8F0FB;--blue-text:#0C3D7A;
    --green:#2A7A4B;--green-bg:#E6F4EC;--green-text:#1A5233;
    --amber:#B06A10;--amber-bg:#FDF0DC;--amber-text:#7A4A0A;
    --red:#C0392B;--red-bg:#FDECEB;
    --radius:10px;--radius-lg:14px;
    --shadow:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.05);
    --shadow-md:0 4px 12px rgba(0,0,0,0.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}

  /* ── Header ── */
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .header-brand{display:flex;align-items:center;gap:10px;}
  .brand-dot{width:28px;height:28px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;}
  .brand-name{font-size:16px;font-weight:600;}
  .brand-name span{color:var(--blue);}
  .header-actions{display:flex;gap:8px;}

  /* ── SDA Tab Bar ── */
  .sda-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;gap:4px;overflow-x:auto;position:sticky;top:60px;z-index:40;}
  .sda-tab{height:44px;padding:0 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-muted);border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
  .sda-tab:hover{color:var(--text);background:var(--bg);}
  .sda-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600;}
  .sda-tab .tab-count{font-size:11px;background:var(--blue-bg);color:var(--blue-text);border-radius:10px;padding:1px 7px;font-weight:600;}
  .sda-tab.active .tab-count{background:var(--blue);color:#fff;}
  .sda-tab-all{border-right:1px solid var(--border);margin-right:4px;padding-right:20px;}

  /* ── Buttons ── */
  .btn{height:36px;padding:0 16px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border-mid);background:var(--surface);color:var(--text);transition:all 0.12s;white-space:nowrap;}
  .btn:hover{background:var(--surface2);}
  .btn-primary{background:var(--blue);color:#fff;border-color:var(--blue);}
  .btn-primary:hover{background:#0C3D7A;border-color:#0C3D7A;}
  .btn-sm{height:30px;padding:0 12px;font-size:12px;}
  .btn-danger{color:var(--red);border-color:transparent;background:transparent;}
  .btn-danger:hover{background:var(--red-bg);}

  /* ── Layout ── */
  .main{max-width:1100px;margin:0 auto;padding:2rem;}
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;box-shadow:var(--shadow);}
  .stat-label{font-size:12px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
  .stat-value{font-size:28px;font-weight:600;color:var(--text);line-height:1;}
  .stat-card.highlight{background:var(--blue);border-color:var(--blue);}
  .stat-card.highlight .stat-label{color:rgba(255,255,255,0.7);}
  .stat-card.highlight .stat-value{color:#fff;}

  /* ── Toolbar ── */
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap;}
  .search-wrap{position:relative;flex:1;min-width:180px;}
  .search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-hint);font-size:16px;pointer-events:none;}
  .search-wrap input{width:100%;height:38px;padding:0 12px 0 36px;border:1px solid var(--border-mid);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:14px;background:var(--surface);color:var(--text);}
  .search-wrap input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,164,0.1);}
  select{height:38px;padding:0 12px;border:1px solid var(--border-mid);border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:13px;background:var(--surface);color:var(--text);cursor:pointer;}
  select:focus{outline:none;border-color:var(--blue);}

  /* ── Cards ── */
  .cards-list{display:flex;flex-direction:column;gap:10px;}
  .muni-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow 0.15s,border-color 0.15s;}
  .muni-card:hover{box-shadow:var(--shadow-md);border-color:var(--border-mid);}
  .muni-card.completed{border-color:#A8D5BA;background:#FAFFFE;}
  .muni-card.completed .card-header{background:linear-gradient(90deg,#F0FAF4 0%,#FAFFFE 100%);}
  .card-header{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;user-select:none;}
  .avatar{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
  .muni-card.completed .avatar{background:var(--green-bg)!important;color:var(--green-text)!important;}
  .card-meta{flex:1;min-width:0;}
  .card-name-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .name-display{font-size:15px;font-weight:600;color:var(--text);cursor:text;border-bottom:1px dashed transparent;transition:border-color 0.15s;}
  .name-display:hover{border-bottom-color:var(--border-mid);}
  .name-edit{font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;color:var(--text);border:none;border-bottom:2px solid var(--blue);background:transparent;outline:none;min-width:120px;max-width:300px;}
  .completed-badge{font-size:11px;font-weight:600;background:var(--green-bg);color:var(--green-text);border:1px solid #A8D5BA;padding:2px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;}
  .current-stage-badge{font-size:11px;font-weight:600;background:var(--blue-bg);color:var(--blue-text);border:1px solid #9BBCEE;padding:2px 10px;border-radius:20px;white-space:nowrap;}
  .card-sub{font-size:12px;color:var(--text-muted);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .badge-pending{background:var(--amber-bg);color:var(--amber-text);font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;}
  .data-stars-inline{display:flex;align-items:center;gap:2px;margin-left:2px;}
  .data-stars-inline .dstar{font-size:13px;cursor:pointer;color:#D4AF37;opacity:0.3;transition:opacity 0.1s;}
  .data-stars-inline .dstar.lit{opacity:1;}
  .stage-track{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;flex:2;}
  .pill{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid;white-space:nowrap;font-weight:500;}
  .pill-done{background:var(--green-bg);color:var(--green-text);border-color:#A8D5BA;}
  .pill-active{background:var(--blue-bg);color:var(--blue-text);border-color:#9BBCEE;}
  .pill-todo{background:var(--bg);color:var(--text-hint);border-color:var(--border);}
  .chevron{font-size:18px;color:var(--text-hint);transition:transform 0.2s;flex-shrink:0;}
  .chevron.open{transform:rotate(180deg);}
  .progress-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:var(--blue);border-radius:2px;transition:width 0.3s;}
  .muni-card.completed .progress-bar-fill{background:var(--green);}

  /* ── Card body ── */
  .card-body{display:none;border-top:1px solid var(--border);padding:20px 18px;}
  .card-body.open{display:block;}
  .section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-hint);margin-bottom:10px;}
  .fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
  .field{display:flex;flex-direction:column;gap:4px;}
  .field.full{grid-column:1/-1;}
  .field label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-hint);}
  .field input,.field select,.field textarea{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--bg);border:1px solid var(--border-mid);border-radius:var(--radius);padding:7px 10px;transition:border-color 0.12s;}
  .field input{height:34px;}
  .field select{height:34px;cursor:pointer;}
  .field textarea{resize:vertical;min-height:60px;line-height:1.5;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);background:var(--surface);box-shadow:0 0 0 3px rgba(26,86,164,0.08);}

  /* ── Contacts ── */
  .contacts-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;}
  .contact-block{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;display:flex;flex-direction:column;gap:8px;}
  .contact-block-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-hint);margin-bottom:2px;}
  .star-rating{display:flex;align-items:center;gap:3px;}
  .star-rating .star{font-size:18px;cursor:pointer;color:#D4AF37;opacity:0.25;transition:opacity 0.1s,transform 0.1s;user-select:none;}
  .star-rating .star.lit{opacity:1;}
  .star-rating .star:hover{transform:scale(1.2);}
  .star-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-hint);margin-bottom:4px;}

  /* ── Products ── */
  .products-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
  .product-toggle{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;border:1px solid var(--border-mid);background:var(--bg);color:var(--text-muted);cursor:pointer;transition:all 0.12s;}
  .product-toggle:hover{border-color:var(--blue);color:var(--blue);}
  .product-toggle.selected{background:var(--blue-bg);color:var(--blue-text);border-color:#9BBCEE;font-weight:600;}

  /* ── Stages ── */
  .stages-wrap{margin-bottom:20px;}
  .stages-btns{display:flex;flex-wrap:wrap;gap:7px;}
  .stage-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1px solid var(--border-mid);background:var(--bg);color:var(--text-muted);cursor:pointer;transition:all 0.12s;display:flex;align-items:center;gap:5px;}
  .stage-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg);}
  .stage-btn.done{background:var(--green-bg);color:var(--green-text);border-color:#A8D5BA;}
  .stage-btn.active{background:var(--blue-bg);color:var(--blue-text);border-color:#9BBCEE;}
  .twoweek-date{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 14px;background:var(--green-bg);border:1px solid #A8D5BA;border-radius:var(--radius);}
  .twoweek-date label{font-size:12px;font-weight:600;color:var(--green-text);white-space:nowrap;}
  .twoweek-date input{height:28px;font-size:13px;font-family:'DM Sans',sans-serif;border:1px solid #A8D5BA;border-radius:6px;padding:0 8px;background:var(--surface);color:var(--text);}

  /* ── Date + notes blocks ── */
  .date-notes-block{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
  .date-notes-block .dn-top{display:flex;align-items:center;gap:14px;margin-bottom:10px;flex-wrap:wrap;}
  .date-notes-block .dn-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-hint);white-space:nowrap;}
  .date-notes-block input[type=date]{height:32px;font-size:13px;font-family:'DM Sans',sans-serif;border:1px solid var(--border-mid);border-radius:var(--radius);padding:0 10px;background:var(--surface);color:var(--text);}
  .date-notes-block input[type=date]:focus{outline:none;border-color:var(--blue);}
  .date-notes-block textarea{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--surface);border:1px solid var(--border-mid);border-radius:var(--radius);padding:8px 10px;resize:vertical;min-height:52px;line-height:1.5;}
  .date-notes-block textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,164,0.08);}

  /* ── Action items ── */
  .checklist-section{margin-bottom:16px;}
  .checklist-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-hint);margin-bottom:8px;}
  .checklist-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;}
  .check-item{display:flex;align-items:center;gap:8px;padding:5px 0;}
  .check-item input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--blue);flex-shrink:0;}
  .check-item label{font-size:13px;color:var(--text);cursor:pointer;}
  .check-item label.done{text-decoration:line-through;color:var(--text-hint);}

  .action-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);}
  .action-item:last-of-type{border-bottom:none;}
  .action-cb{width:16px;height:16px;cursor:pointer;accent-color:var(--blue);flex-shrink:0;}
  .action-label{flex:1;font-size:13px;color:var(--text);}
  .action-label.done{text-decoration:line-through;color:var(--text-hint);}
  .action-del{background:none;border:none;cursor:pointer;color:var(--text-hint);font-size:16px;padding:2px;transition:color 0.1s;}
  .action-del:hover{color:var(--red);}
  .add-action{display:flex;gap:8px;margin-top:10px;}
  .add-action input{flex:1;height:34px;font-family:'DM Sans',sans-serif;font-size:13px;padding:0 10px;border:1px solid var(--border-mid);border-radius:var(--radius);background:var(--bg);color:var(--text);}
  .add-action input:focus{outline:none;border-color:var(--blue);background:var(--surface);}

  .card-footer{display:flex;justify-content:flex-end;padding-top:14px;border-top:1px solid var(--border);margin-top:4px;}
  .empty{text-align:center;padding:4rem 1rem;color:var(--text-muted);}
  .empty i{font-size:40px;display:block;margin-bottom:12px;color:var(--text-hint);}

  /* ── Modal ── */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;}
  .modal{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);width:540px;max-width:100%;padding:28px;max-height:90vh;overflow-y:auto;}
  .modal-title{font-size:18px;font-weight:600;margin-bottom:20px;}
  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
  .modal-field{display:flex;flex-direction:column;gap:5px;}
  .modal-field.full{grid-column:1/-1;}
  .modal-field label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);}
  .modal-field input,.modal-field select{height:38px;padding:0 12px;font-family:'DM Sans',sans-serif;font-size:14px;border:1px solid var(--border-mid);border-radius:var(--radius);background:var(--bg);color:var(--text);}
  .modal-field input:focus,.modal-field select:focus{outline:none;border-color:var(--blue);background:var(--surface);box-shadow:0 0 0 3px rgba(26,86,164,0.08);}
  .modal-section{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-hint);margin:16px 0 10px;grid-column:1/-1;border-top:1px solid var(--border);padding-top:14px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;}
  .cancel-btn{background:var(--surface2);border:1px solid var(--border-mid);border-radius:var(--radius);color:var(--text);}

  .toast{position:fixed;bottom:28px;right:28px;background:#1A1916;color:#fff;font-size:13px;font-weight:500;padding:12px 20px;border-radius:var(--radius);box-shadow:var(--shadow-md);z-index:300;opacity:0;transform:translateY(8px);transition:opacity 0.2s,transform 0.2s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}
  .divider{border:none;border-top:1px solid var(--border);margin:16px 0;}

  @media(max-width:700px){
    .main{padding:1rem;}
    .stage-track{display:none;}
    .fields-grid,.contacts-grid,.modal-grid,.checklist-grid{grid-template-columns:1fr;}
    .header,.sda-bar{padding:0 1rem;}
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="brand-dot"><i class="ti ti-building-community" style="font-size:15px"></i></div>
    <span class="brand-name">Clear<span>Gov</span> Onboarding</span>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="exportExcel()"><i class="ti ti-file-spreadsheet"></i> Export to Excel</button>
    <button class="btn btn-primary" onclick="openModal()"><i class="ti ti-plus"></i> Add Municipality</button>
  </div>
</header>

<!-- SDA Tab Bar -->
<nav class="sda-bar" id="sda-bar"><button class="sda-tab sda-tab-all active" onclick="setActiveSDA(&#39;All&#39;)">
    All <span class="tab-count">0</span>
  </button><button class="sda-tab" onclick="setActiveSDA(&#39;Zach&#39;)">
      Zach
    </button><button class="sda-tab" onclick="setActiveSDA(&#39;Tiffany&#39;)">
      Tiffany
    </button><button class="sda-tab" onclick="setActiveSDA(&#39;Ruth&#39;)">
      Ruth
    </button><button class="sda-tab" onclick="setActiveSDA(&#39;Michelle&#39;)">
      Michelle
    </button><button class="sda-tab" onclick="setActiveSDA(&#39;Kyle&#39;)">
      Kyle
    </button><button class="sda-tab" onclick="setActiveSDA(&#39;Emily&#39;)">
      Emily
    </button><button class="sda-tab" onclick="setActiveSDA(&#39;Alex&#39;)">
      Alex
    </button><button class="sda-tab" onclick="setActiveSDA(&#39;Adam&#39;)">
      Adam
    </button></nav>

<main class="main">
  <div class="stats-row" id="stats-row">
    <div class="stat-card highlight"><div class="stat-label">Total</div><div class="stat-value">0</div></div>
    <div class="stat-card"><div class="stat-label">In progress</div><div class="stat-value">0</div></div>
    <div class="stat-card"><div class="stat-label">Live</div><div class="stat-value">0</div></div>
    <div class="stat-card"><div class="stat-label">Complete</div><div class="stat-value">0</div></div></div>
  <div class="toolbar">
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" id="search" placeholder="Search by name or CGID…" oninput="render()">
    </div>
    <select id="filter-stage" onchange="render()">
      <option value="">All stages</option>
      <option>Kickoff call</option>
      <option>Data collection</option>
      <option>Mapping review call</option>
      <option>Platform configuration</option>
      <option>Data Launch</option>
      <option>2 Week Close</option>
    </select>
  </div>
  <div class="cards-list" id="cards-list"><div class="empty"><i class="ti ti-building"></i><p>No municipalities found</p></div></div>
</main>

<!-- Add Modal -->
<div class="modal-backdrop" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">Add Municipality</div>
    <div class="modal-grid">
      <div class="modal-field full"><label>Municipality name *</label><input id="m-name" placeholder="City of Springfield" type="text"></div>
      <div class="modal-field full"><label>CGID</label><input id="m-cgid" placeholder="CG-00000" type="text"></div>
      <div class="modal-field"><label>IM</label><input id="m-rep" placeholder="IM name" type="text"></div>
      <div class="modal-field"><label>SDA</label>
        <input id="m-csm" placeholder="SDA name" type="text">
      </div>
      <div class="modal-field"><label>ERP system</label>
        <select id="m-erp" onchange="toggleModalErpOther()">
          <option value="">Select ERP…</option>
          <option>Tyler Munis</option><option>Tyler New World</option><option>Caselle</option>
          <option>BS&amp;A</option><option>Incode</option><option>Questica</option>
          <option>Civic Systems</option><option>QuickBooks</option><option value="Other">Other (type below)</option>
        </select>
      </div>
      <div class="modal-field" id="m-erp-other-wrap" style="display:none"><label>ERP — specify</label><input id="m-erp-other" placeholder="Type ERP name…" type="text"></div>
      <div class="modal-section">Contacts (up to 3)</div>
      <div class="modal-field"><label>Contact 1 — Name</label><input id="m-c1name" placeholder="Jane Doe" type="text"></div>
      <div class="modal-field"><label>Contact 1 — Title</label><input id="m-c1title" placeholder="Finance Director" type="text"></div>
      <div class="modal-field"><label>Contact 2 — Name</label><input id="m-c2name" placeholder="John Smith" type="text"></div>
      <div class="modal-field"><label>Contact 2 — Title</label><input id="m-c2title" placeholder="IT Manager" type="text"></div>
      <div class="modal-field"><label>Contact 3 — Name</label><input id="m-c3name" placeholder="Alex Lee" type="text"></div>
      <div class="modal-field"><label>Contact 3 — Title</label><input id="m-c3title" placeholder="Budget Analyst" type="text"></div>
      <div class="modal-section">Key dates</div>
      <div class="modal-field"><label>Kickoff call date</label><input id="m-kickoff" type="date"></div>
      <div class="modal-field"><label>Mapping review call date</label><input id="m-mapping" type="date"></div>
      <div class="modal-field full"><label>Data launch date</label><input id="m-launch" type="date"></div>
      <div class="modal-section">Products used</div>
      <div class="modal-field full">
        <div class="products-wrap" id="modal-products">
          <button type="button" class="product-toggle" data-val="OB" onclick="toggleModalProduct(this)">OB</button>
          <button type="button" class="product-toggle" data-val="CB" onclick="toggleModalProduct(this)">CB</button>
          <button type="button" class="product-toggle" data-val="DBB" onclick="toggleModalProduct(this)">DBB</button>
          <button type="button" class="product-toggle" data-val="TR" onclick="toggleModalProduct(this)">TR</button>
          <button type="button" class="product-toggle" data-val="DFR" onclick="toggleModalProduct(this)">DFR</button>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn cancel-btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNew()"><i class="ti ti-plus"></i> Add Municipality</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STAGES=["Kickoff call","Data collection","Mapping review call","Platform configuration","Data Launch","2 Week Close"];
const PRODUCTS=["OB","CB","DBB","TR","DFR"];
const ERP_OPTIONS=["Tyler Munis","Tyler New World","Caselle","BS&A","Incode","Questica","Civic Systems","QuickBooks","Other"];
const SDAS=["Zach","Tiffany","Ruth","Michelle","Kyle","Emily","Alex","Adam"];
const CHECKLIST_ITEMS=["Receive data","COA","Kickoff call","Map and load data","Schedule mapping review call","Schedule data launch and review call","Add 2 week post close out"];
const AVATAR_COLORS=[["#DBEAFE","#1E40AF"],["#D1FAE5","#065F46"],["#EDE9FE","#4C1D95"],["#FEF3C7","#92400E"],["#FCE7F3","#9D174D"],["#DCFCE7","#14532D"],["#FEE2E2","#991B1B"]];

let activeSDA="All";

let data=JSON.parse(localStorage.getItem("cg_onboarding_v5")||"null")||{
  munis:[
    {id:1,name:"City of Lakewood",cgid:"CG-10241",
     contacts:[{name:"Maria Santos",title:"Finance Director",stars:0},{name:"",title:"",stars:0},{name:"",title:"",stars:0}],
     rep:"",csm:"Michelle",erp:"Tyler Munis",erpOther:"",products:["OB","TR"],
     kickoff:"2026-02-01",kickoffNotes:"",mapping:"2026-03-15",mappingNotes:"",launch:"2026-06-15",launchNotes:"",twoweekdate:"",
     dataStars:0,checklist:{},stages:{},actions:[{id:1,text:"Follow up on budget data",done:false}],
     notes:"Waiting on finance team to provide actuals."},
    {id:2,name:"Township of Maplewood",cgid:"CG-10255",
     contacts:[{name:"Derek Hill",title:"IT Manager",stars:0},{name:"",title:"",stars:0},{name:"",title:"",stars:0}],
     rep:"",csm:"Michelle",erp:"Caselle",erpOther:"",products:["CB"],
     kickoff:"2026-03-10",kickoffNotes:"",mapping:"",mappingNotes:"",launch:"2026-07-01",launchNotes:"",twoweekdate:"",
     dataStars:0,checklist:{},stages:{},actions:[],
     notes:"Small team — schedule training around council meetings."}
  ],
  nextId:3
};

function save(){localStorage.setItem("cg_onboarding_v5",JSON.stringify(data));}
function getLastDone(m){let l=-1;STAGES.forEach((s,i)=>{if(m.stages[s]==="done")l=i;});return l;}
function isComplete(m){return m.stages["2 Week Close"]==="done";}
function getCurrentStage(m){if(isComplete(m))return null;const l=getLastDone(m);if(l<STAGES.length-1)return STAGES[l+1];return null;}
function getStatus(m){if(isComplete(m))return"Complete";if(m.stages["Data Launch"]==="done")return"Live";if(getLastDone(m)>=0)return"In progress";return"Not started";}
function pillCls(m,s,i){if(m.stages[s]==="done")return"pill-done";if(i===getLastDone(m)+1)return"pill-active";return"pill-todo";}
function stageBtnCls(m,s){if(m.stages[s]==="done")return"done";if(STAGES.indexOf(s)===getLastDone(m)+1)return"active";return"";}
function initials(n){return n.split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase();}
function avatarStyle(i){const c=AVATAR_COLORS[i%AVATAR_COLORS.length];return`background:${c[0]};color:${c[1]}`;}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2600);}
function toggleModalProduct(el){el.classList.toggle("selected");}
function getModalProducts(){return[...document.querySelectorAll("#modal-products .product-toggle.selected")].map(b=>b.dataset.val);}
function resetModalProducts(){document.querySelectorAll("#modal-products .product-toggle").forEach(b=>b.classList.remove("selected"));}
function toggleModalErpOther(){const v=document.getElementById("m-erp").value;document.getElementById("m-erp-other-wrap").style.display=v==="Other"?"flex":"none";}
function starsHtml(val,onClickFn){return`<div class="star-rating">${[1,2,3,4,5].map(i=>`<span class="star${val>=i?" lit":""}" onclick="${onClickFn}(${i})" onmouseover="hoverStars(this,${i})" onmouseleave="resetStarHover(this)">★</span>`).join("")}</div>`;}
function hoverStars(el,n){const w=el.closest(".star-rating");w.querySelectorAll(".star").forEach((s,i)=>{s.style.opacity=i<n?"1":"0.25";});}
function resetStarHover(el){const w=el.closest(".star-rating");w.querySelectorAll(".star").forEach(s=>{s.style.opacity="";});}

function setActiveSDA(name){activeSDA=name;render();}

function renderTabs(){
  const bar=document.getElementById("sda-bar");
  const allCount=data.munis.length;
  let html=`<button class="sda-tab sda-tab-all${activeSDA==="All"?" active":""}" onclick="setActiveSDA('All')">
    All <span class="tab-count">${allCount}</span>
  </button>`;
  SDAS.forEach(name=>{
    const count=data.munis.filter(m=>m.csm===name).length;
    html+=`<button class="sda-tab${activeSDA===name?" active":""}" onclick="setActiveSDA('${name}')">
      ${name}${count>0?` <span class="tab-count">${count}</span>`:""}
    </button>`;
  });
  bar.innerHTML=html;
}

function render(){
  renderTabs();
  const q=(document.getElementById("search").value||"").toLowerCase();
  const fs=document.getElementById("filter-stage").value;

  let munis=data.munis.filter(m=>{
    if(activeSDA!=="All"&&m.csm!==activeSDA)return false;
    if(q&&!m.name.toLowerCase().includes(q)&&!(m.cgid||"").toLowerCase().includes(q))return false;
    if(fs){const i=STAGES.indexOf(fs);const l=getLastDone(m);if(!(m.stages[fs]==="done"||(i===l+1)))return false;}
    return true;
  });

  // Stats for current view
  const viewTotal=munis.length;
  const viewLive=munis.filter(m=>m.stages["Data Launch"]==="done"&&!isComplete(m)).length;
  const viewInProg=munis.filter(m=>getLastDone(m)>=0&&!m.stages["Data Launch"]).length;
  const viewComplete=munis.filter(m=>isComplete(m)).length;
  document.getElementById("stats-row").innerHTML=`
    <div class="stat-card highlight"><div class="stat-label">${activeSDA==="All"?"Total":"Total — "+activeSDA}</div><div class="stat-value">${viewTotal}</div></div>
    <div class="stat-card"><div class="stat-label">In progress</div><div class="stat-value">${viewInProg}</div></div>
    <div class="stat-card"><div class="stat-label">Live</div><div class="stat-value">${viewLive}</div></div>
    <div class="stat-card"><div class="stat-label">Complete</div><div class="stat-value">${viewComplete}</div></div>`;

  const container=document.getElementById("cards-list");
  if(!munis.length){container.innerHTML=`<div class="empty"><i class="ti ti-building"></i><p>${activeSDA==="All"?"No municipalities found":"No municipalities assigned to "+activeSDA+" yet"}</p></div>`;return;}

  container.innerHTML=munis.map(m=>{
    const ci=data.munis.indexOf(m);
    const open=m._open?"open":"";
    const complete=isComplete(m);
    const currentStage=getCurrentStage(m);
    const pending=m.actions.filter(a=>!a.done).length;
    const checkDone=CHECKLIST_ITEMS.filter(c=>(m.checklist||{})[c]).length;
    const doneCnt=STAGES.filter(s=>m.stages[s]==="done").length;
    const pct=Math.round((doneCnt/STAGES.length)*100);
    const contacts=m.contacts||[{name:"",title:"",stars:0},{name:"",title:"",stars:0},{name:"",title:"",stars:0}];
    const prods=(m.products||[]).join(", ");
    const twoWeekDone=m.stages["2 Week Close"]==="done";
    const erpDisplay=m.erp==="Other"?(m.erpOther||"Other"):m.erp;
    const dsHtml=[1,2,3,4,5].map(i=>`<span class="dstar${(m.dataStars||0)>=i?" lit":""}" onclick="event.stopPropagation();setDataStars(${m.id},${i})">★</span>`).join("");

    return`<div class="muni-card${complete?" completed":""}" id="card-${m.id}">
      <div class="card-header" onclick="toggleCard(${m.id})">
        <div class="avatar" style="${complete?"":avatarStyle(ci)}">${complete?'<i class="ti ti-check" style="font-size:18px"></i>':initials(m.name)}</div>
        <div class="card-meta">
          <div class="card-name-row">
            <span class="name-display" id="name-disp-${m.id}" onclick="event.stopPropagation();startEditName(${m.id})">${m.name}</span>
            ${complete?`<span class="completed-badge"><i class="ti ti-circle-check" style="font-size:12px"></i> Onboarding complete</span>`:currentStage?`<span class="current-stage-badge">${currentStage}</span>`:""}
          </div>
          <div class="card-sub">
            <span>${m.cgid||"No CGID"}</span>
            ${m.rep?`<span>·</span><span>IM: ${m.rep}</span>`:""}
            <span>·</span><span>SDA: ${m.csm||"—"}</span>
            ${erpDisplay?`<span>·</span><span>${erpDisplay}</span>`:""}
            ${prods?`<span>·</span><span>${prods}</span>`:""}
            <div class="data-stars-inline">${dsHtml}</div>
            ${pending||checkDone<CHECKLIST_ITEMS.length?`<span class="badge-pending">${checkDone}/${CHECKLIST_ITEMS.length} steps${pending?" · "+pending+" action"+(pending>1?"s":"")+" pending":""}</span>`:""}
          </div>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="stage-track">${STAGES.map((s,i)=>`<span class="pill ${pillCls(m,s,i)}">${s}</span>`).join("")}</div>
        <i class="ti ti-chevron-down chevron ${open}"></i>
      </div>
      <div class="card-body ${open}">

        <div class="section-label">Contacts</div>
        <div class="contacts-grid">
          ${[0,1,2].map(idx=>{
            const c=contacts[idx]||{name:"",title:"",stars:0};
            return`<div class="contact-block">
              <div class="contact-block-label">Contact ${idx+1}</div>
              <div class="field"><label>Name</label><input value="${c.name||""}" onchange="updContact(${m.id},${idx},'name',this.value)" placeholder="Full name"></div>
              <div class="field"><label>Title</label><input value="${c.title||""}" onchange="updContact(${m.id},${idx},'title',this.value)" placeholder="Job title"></div>
              <div><div class="star-label">Attention needed</div>${starsHtml(c.stars||0,`setContactStars_${m.id}_${idx}`)}</div>
            </div>`;
          }).join("")}
        </div>

        <hr class="divider">
        <div class="section-label">Account details</div>
        <div class="fields-grid">
          <div class="field"><label>IM</label><input value="${m.rep||""}" onchange="upd(${m.id},'rep',this.value)" placeholder="Rep name"></div>
          <div class="field"><label>SDA</label>
            <input value="${m.csm||''}" onchange="upd(${m.id},'csm',this.value);save();render();" placeholder="SDA name">
          </div>
          <div class="field"><label>CGID</label><input value="${m.cgid||""}" onchange="upd(${m.id},'cgid',this.value)" placeholder="CG-00000"></div>
          <div class="field"><label>ERP system</label>
            <select onchange="handleErpChange(${m.id},this.value)">
              <option value="">Select ERP…</option>
              ${ERP_OPTIONS.map(e=>`<option${m.erp===e?" selected":""}>${e}</option>`).join("")}
            </select>
          </div>
          ${m.erp==="Other"?`<div class="field full"><label>ERP — specify</label><input value="${m.erpOther||""}" onchange="upd(${m.id},'erpOther',this.value)" placeholder="Type ERP name…"></div>`:""}
          <div class="field full"><label>Products used</label>
            <div class="products-wrap">
              ${PRODUCTS.map(p=>`<button type="button" class="product-toggle${(m.products||[]).includes(p)?" selected":""}" onclick="toggleProduct(${m.id},'${p}',this)">${p}</button>`).join("")}
            </div>
          </div>
          <div class="field full"><div class="star-label">Data / tier difficulty</div>${starsHtml(m.dataStars||0,`setDataStars_card_${m.id}`)}</div>
        </div>

        <hr class="divider">
        <div class="section-label">Key dates &amp; notes</div>
        <div class="date-notes-block">
          <div class="dn-top"><div class="dn-label"><i class="ti ti-phone" style="font-size:13px;margin-right:4px"></i>Kickoff call</div><input type="date" value="${m.kickoff||""}" onchange="upd(${m.id},'kickoff',this.value)"></div>
          <textarea placeholder="Notes from kickoff call…" onchange="upd(${m.id},'kickoffNotes',this.value)">${m.kickoffNotes||""}</textarea>
        </div>
        <div class="date-notes-block">
          <div class="dn-top"><div class="dn-label"><i class="ti ti-map" style="font-size:13px;margin-right:4px"></i>Mapping review call</div><input type="date" value="${m.mapping||""}" onchange="upd(${m.id},'mapping',this.value)"></div>
          <textarea placeholder="Notes from mapping review call…" onchange="upd(${m.id},'mappingNotes',this.value)">${m.mappingNotes||""}</textarea>
        </div>
        <div class="date-notes-block">
          <div class="dn-top"><div class="dn-label"><i class="ti ti-rocket" style="font-size:13px;margin-right:4px"></i>Data launch</div><input type="date" value="${m.launch||""}" onchange="upd(${m.id},'launch',this.value)"></div>
          <textarea placeholder="Notes from data launch…" onchange="upd(${m.id},'launchNotes',this.value)">${m.launchNotes||""}</textarea>
        </div>
        <div class="field" style="margin-bottom:20px;margin-top:4px">
          <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-hint);margin-bottom:4px;display:block">General notes / next steps</label>
          <textarea style="width:100%;font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;border:1px solid var(--border-mid);border-radius:var(--radius);background:var(--bg);resize:vertical;min-height:56px;line-height:1.5;color:var(--text);" onchange="upd(${m.id},'notes',this.value)" placeholder="Add general notes…">${m.notes||""}</textarea>
        </div>

        <hr class="divider">
        <div class="checklist-section">
          <div class="checklist-label">Onboarding checklist — ${checkDone}/${CHECKLIST_ITEMS.length} complete</div>
          <div class="checklist-grid">
            ${CHECKLIST_ITEMS.map(item=>{
              const checked=(m.checklist||{})[item]||false;
              const safeId=`chk_${m.id}_${item.replace(/\s+/g,'_')}`;
              return`<div class="check-item">
                <input type="checkbox" id="${safeId}" ${checked?"checked":""} onchange="toggleChecklist(${m.id},'${item.replace(/'/g,"\\'")}',this.checked)">
                <label for="${safeId}" class="${checked?"done":""}">${item}</label>
              </div>`;
            }).join("")}
          </div>
        </div>

        <hr class="divider">
        <div class="stages-wrap">
          <div class="section-label">Onboarding stages — click to mark complete</div>
          <div class="stages-btns">
            ${STAGES.map(s=>{
              if(s==="2 Week Close"){return`<div><button class="stage-btn ${stageBtnCls(m,s)}" onclick="toggleStage(${m.id},'${s}')">${m.stages[s]==="done"?'<i class="ti ti-check" style="font-size:12px"></i>':""} 2 Week Close</button>${twoWeekDone?`<div class="twoweek-date"><label><i class="ti ti-calendar" style="font-size:13px;margin-right:4px"></i>Close date</label><input type="date" value="${m.twoweekdate||""}" onchange="upd(${m.id},'twoweekdate',this.value)"></div>`:""}</div>`;}
              return`<button class="stage-btn ${stageBtnCls(m,s)}" onclick="toggleStage(${m.id},'${s}')">${m.stages[s]==="done"?'<i class="ti ti-check" style="font-size:12px"></i>':""} ${s}</button>`;
            }).join("")}
          </div>
        </div>

        <hr class="divider">
        <div class="section-label">Additional action items</div>
        ${m.actions.map(a=>`<div class="action-item">
          <input type="checkbox" class="action-cb" ${a.done?"checked":""} onchange="toggleAction(${m.id},${a.id},this.checked)">
          <span class="action-label ${a.done?"done":""}">${a.text}</span>
          <button class="action-del" onclick="delAction(${m.id},${a.id})"><i class="ti ti-trash"></i></button>
        </div>`).join("")}
        <div class="add-action">
          <input type="text" placeholder="Add an action item…" id="ai-${m.id}" onkeydown="if(event.key==='Enter')addAction(${m.id})">
          <button class="btn btn-sm" onclick="addAction(${m.id})"><i class="ti ti-plus"></i> Add</button>
        </div>

        <div class="card-footer">
          <button class="btn btn-sm btn-danger" onclick="delMuni(${m.id})"><i class="ti ti-trash"></i> Remove municipality</button>
        </div>
      </div>
    </div>`;
  }).join("");

  // Attach star functions dynamically
  data.munis.forEach(m=>{
    window[`setDataStars_card_${m.id}`]=function(v){setDataStars(m.id,v);};
    [0,1,2].forEach(idx=>{
      window[`setContactStars_${m.id}_${idx}`]=function(v){updContact(m.id,idx,'stars',v);save();render();data.munis.find(x=>x.id===m.id)._open=true;render();};
    });
  });
}

function startEditName(id){
  const m=data.munis.find(x=>x.id===id);
  const disp=document.getElementById("name-disp-"+id);
  const inp=document.createElement("input");
  inp.className="name-edit";inp.value=m.name;
  disp.replaceWith(inp);inp.focus();inp.select();
  function commit(){const v=inp.value.trim()||m.name;m.name=v;save();render();data.munis.find(x=>x.id===id)._open=true;render();}
  inp.addEventListener("blur",commit);
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")inp.blur();if(e.key==="Escape"){inp.value=m.name;inp.blur();}});
}

function toggleCard(id){const m=data.munis.find(x=>x.id===id);m._open=!m._open;render();}
function upd(id,f,v){const m=data.munis.find(x=>x.id===id);m[f]=v;save();}
function updContact(id,idx,field,val){const m=data.munis.find(x=>x.id===id);if(!m.contacts)m.contacts=[{name:"",title:"",stars:0},{name:"",title:"",stars:0},{name:"",title:"",stars:0}];m.contacts[idx][field]=val;save();}
function handleErpChange(id,val){const m=data.munis.find(x=>x.id===id);m.erp=val;if(val!=="Other")m.erpOther="";save();m._open=true;render();}
function toggleProduct(id,prod,el){const m=data.munis.find(x=>x.id===id);if(!m.products)m.products=[];const i=m.products.indexOf(prod);if(i>=0)m.products.splice(i,1);else m.products.push(prod);el.classList.toggle("selected");save();}
function setDataStars(id,v){const m=data.munis.find(x=>x.id===id);m.dataStars=m.dataStars===v?0:v;save();m._open=true;render();}
function toggleChecklist(id,item,done){const m=data.munis.find(x=>x.id===id);if(!m.checklist)m.checklist={};m.checklist[item]=done;save();m._open=true;render();}
function toggleStage(id,s){const m=data.munis.find(x=>x.id===id);m.stages[s]=m.stages[s]==="done"?"":"done";save();render();}
function toggleAction(id,aid,done){const m=data.munis.find(x=>x.id===id);m.actions.find(x=>x.id===aid).done=done;save();render();}
function delAction(id,aid){const m=data.munis.find(x=>x.id===id);m.actions=m.actions.filter(x=>x.id!==aid);save();render();}
function addAction(id){const inp=document.getElementById("ai-"+id);const txt=inp.value.trim();if(!txt)return;const m=data.munis.find(x=>x.id===id);m.actions.push({id:Date.now(),text:txt,done:false});save();render();data.munis.find(x=>x.id===id)._open=true;render();}
function delMuni(id){if(!confirm("Remove this municipality?"))return;data.munis=data.munis.filter(x=>x.id!==id);save();render();}
function openModal(){document.getElementById("modal").style.display="flex";}
function closeModal(){
  document.getElementById("modal").style.display="none";resetModalProducts();
  ["m-name","m-cgid","m-rep","m-c1name","m-c1title","m-c2name","m-c2title","m-c3name","m-c3title","m-kickoff","m-mapping","m-launch","m-erp-other"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
  document.getElementById("m-erp").value="";document.getElementById("m-csm").value="";
  document.getElementById("m-erp-other-wrap").style.display="none";
}
function saveNew(){
  const name=document.getElementById("m-name").value.trim();
  if(!name){alert("Please enter a municipality name.");return;}
  const erpVal=document.getElementById("m-erp").value;
  const csmVal=document.getElementById("m-csm").value;
  data.munis.push({
    id:data.nextId++,name,
    cgid:document.getElementById("m-cgid").value.trim(),
    rep:document.getElementById("m-rep").value.trim(),
    csm:csmVal,erp:erpVal,
    erpOther:erpVal==="Other"?document.getElementById("m-erp-other").value.trim():"",
    contacts:[
      {name:document.getElementById("m-c1name").value.trim(),title:document.getElementById("m-c1title").value.trim(),stars:0},
      {name:document.getElementById("m-c2name").value.trim(),title:document.getElementById("m-c2title").value.trim(),stars:0},
      {name:document.getElementById("m-c3name").value.trim(),title:document.getElementById("m-c3title").value.trim(),stars:0}
    ],
    products:getModalProducts(),
    kickoff:document.getElementById("m-kickoff").value,kickoffNotes:"",
    mapping:document.getElementById("m-mapping").value,mappingNotes:"",
    launch:document.getElementById("m-launch").value,launchNotes:"",
    twoweekdate:"",dataStars:0,checklist:{},stages:{},actions:[],notes:"",_open:true
  });
  if(csmVal)activeSDA=csmVal;
  save();closeModal();render();showToast("Municipality added!");
}

function exportExcel(){
  const wb=XLSX.utils.book_new();
  const munis=activeSDA==="All"?data.munis:data.munis.filter(m=>m.csm===activeSDA);
  const s1=[["Municipality","CGID","IM","SDA","ERP","Products","Data Stars",
    "Contact 1","Title 1","Stars 1","Contact 2","Title 2","Stars 2","Contact 3","Title 3","Stars 3",
    "Kickoff Date","Kickoff Notes","Mapping Date","Mapping Notes","Launch Date","Launch Notes","2 Week Close Date",
    ...CHECKLIST_ITEMS,...STAGES,"Stages Done","Status","Additional Actions","General Notes"]];
  munis.forEach(m=>{
    const c=m.contacts||[];
    const done=STAGES.filter(s=>m.stages[s]==="done").length;
    const erpDisplay=m.erp==="Other"?(m.erpOther||"Other"):m.erp;
    s1.push([m.name,m.cgid,m.rep,m.csm,erpDisplay,(m.products||[]).join(", "),m.dataStars||0,
      (c[0]&&c[0].name)||"",(c[0]&&c[0].title)||"",c[0]&&c[0].stars||0,
      (c[1]&&c[1].name)||"",(c[1]&&c[1].title)||"",c[1]&&c[1].stars||0,
      (c[2]&&c[2].name)||"",(c[2]&&c[2].title)||"",c[2]&&c[2].stars||0,
      m.kickoff||"",m.kickoffNotes||"",m.mapping||"",m.mappingNotes||"",
      m.launch||"",m.launchNotes||"",m.twoweekdate||"",
      ...CHECKLIST_ITEMS.map(ci=>(m.checklist||{})[ci]?"✓":""),
      ...STAGES.map(s=>m.stages[s]==="done"?"✓":""),
      done+"/"+STAGES.length,getStatus(m),
      m.actions.filter(a=>!a.done).map(a=>a.text).join("; "),
      m.notes||""]);
  });
  const ws=XLSX.utils.aoa_to_sheet(s1);
  XLSX.utils.book_append_sheet(wb,ws,activeSDA==="All"?"All Municipalities":activeSDA);
  XLSX.writeFile(wb,`ClearGov_${activeSDA==="All"?"All":activeSDA}_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast("Excel downloaded!");
}

render();
</script>
